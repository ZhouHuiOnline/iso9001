<title>获证组织信息验证平台</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
body{
    background:#f5f5f5;
    font-family: "Microsoft Yahei",sans-serif;
}
.top-bar{
    text-align:center;
    padding:20px 10px 10px;
}
.top-title{

.logo-box{

.logo-circle{
    width:320px;
    height:320px;
    border-radius:50%;
    border:6px solid #003399;
    position:relative;
    background:#fff;
}
/* 简易复刻印章文字图案结构，如需高清图可替换img标签 */

    font-size:26px;

}
.status-text{
    color:#fff;
}
.status-valid{
    color:#72d250;
    font-weight:bold;
    margin-left:8px;
}
.info-item{
    font-size:20px;
    line-height:2.2;
    margin:8px 0;
}
.bottom-tip{
    background:#222222;
    color:#ddd;
    font-size:18px;
    padding:10px 20px 20px;
    line-height:1.8;
}
